# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank # the website title (if blank, full name will be used instead)
first_name: Brandon
middle_name: J.
last_name: Sheridan
contact_note: >
  The best way to reach me is via email.
description: > # the ">" symbol means to ignore newlines until "footer_text:"
  Personal academic website of Brandon J. Sheridan, Associate Professor of
  Economics at Elon University. My research focuses on economic growth,
  international trade, and economics education.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: economics, international trade, economic growth, pedagogy, economics education, Elon University
lang: en
icon: # emoji removed for YAML compatibility

url: https://www.brandonsheridan.com # the base hostname & protocol for your site
baseurl: # leave blank - site is served from root domain
last_updated: true
impressum_path:
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------

rss_icon: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
max_width: 800px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: false
serve_schema_org: false
og_image:

